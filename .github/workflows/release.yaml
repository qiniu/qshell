on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths:
      - ".github/workflows/release.yaml"
      - "CHANGELOG.md"
      - "go.mod"
      - "go.sum"
      - "main/**"
      - "cmd/**"
      - "iqshell/**"
  release:
    types: [published]
env:
  CGO_ENABLED: 0
name: Release qshell
jobs:
  release-check:
    name: Release Check
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'release' ||
      contains(github.head_ref, 'release') ||
      contains(github.event.pull_request.title, 'release') ||
      contains(github.event.pull_request.title, 'Release')
    strategy:
      max-parallel: 1
      matrix:
        include:
          # macOS targets
          - goarch: amd64
            goos: darwin
          - goarch: arm64
            goos: darwin
          # Linux targets
          - goarch: "386"
            goos: linux
          - goarch: amd64
            goos: linux
          - goarch: arm
            goos: linux
          - goarch: arm64
            goos: linux
          - goarch: mips
            goos: linux
          - goarch: mipsle
            goos: linux
          - goarch: mips64
            goos: linux
          - goarch: mips64le
            goos: linux
          - goarch: loong64
            goos: linux
          - goarch: riscv64
            goos: linux
          # Windows targets
          - goarch: "386"
            goos: windows
          - goarch: amd64
            goos: windows
          - goarch: arm
            goos: windows
          - goarch: arm64
            goos: windows
    steps:
    - uses: actions/checkout@v4
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.23.2"
    - name: Set APP_VERSION env
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          echo "APP_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
        else
          echo "APP_VERSION=PR-CHECK" >> "$GITHUB_ENV"
        fi
    - name: Build Release Matrix Target
      run: |
        set -e
        OUT="/tmp/qshell-${APP_VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          OUT="${OUT}.exe"
        fi
        GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GO111MODULE=on \
          go build -ldflags "-X github.com/qiniu/qshell/v2/iqshell/common/version.version=${APP_VERSION} -extldflags '-static'" \
          -o "${OUT}" ./main

  publish:
    name: Release Go Binary
    runs-on: ubuntu-latest
    needs: release-check
    if: github.event_name == 'release'
    strategy:
      max-parallel: 1
      matrix:
        include:
          # macOS targets
          - goarch: amd64
            goos: darwin
          - goarch: arm64
            goos: darwin
          # Linux targets
          - goarch: "386"
            goos: linux
          - goarch: amd64
            goos: linux
          - goarch: arm
            goos: linux
          - goarch: arm64
            goos: linux
          - goarch: mips
            goos: linux
          - goarch: mipsle
            goos: linux
          - goarch: mips64
            goos: linux
          - goarch: mips64le
            goos: linux
          - goarch: loong64
            goos: linux
          - goarch: riscv64
            goos: linux
          # Windows targets
          - goarch: "386"
            goos: windows
          - goarch: amd64
            goos: windows
          - goarch: arm
            goos: windows
          - goarch: arm64
            goos: windows
    steps:
    - uses: actions/checkout@v4
    - name: Set APP_VERSION env
      run: echo "APP_VERSION=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
    - name: Prepare qshell
      run: |
        set -e
        wget -qLO /tmp/qshell-v2.11.0-linux-amd64.tar.gz https://devtools.qiniu.com/qshell-v2.11.0-linux-amd64.tar.gz
        tar xf /tmp/qshell-v2.11.0-linux-amd64.tar.gz
        rm /tmp/qshell-v2.11.0-linux-amd64.tar.gz
        ./qshell account -- "$PUBLISH_ACCESS_KEY" "$PUBLISH_SECRET_KEY" default
      env:
        PUBLISH_ACCESS_KEY: ${{ secrets.PUBLISH_ACCESS_KEY }}
        PUBLISH_SECRET_KEY: ${{ secrets.PUBLISH_SECRET_KEY }}
    - uses: wangyoucao577/go-release-action@279495102627de7960cbc33434ab01a12bae144b
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        goversion: "https://go.dev/dl/go1.23.2.linux-amd64.tar.gz"
        ldflags: -X "github.com/qiniu/qshell/v2/iqshell/common/version.version=${{ env.APP_VERSION }}" -extldflags "-static"
        project_path: "./main"
        retry: '100'
    - name: Upload Release Asset to Qiniu
      run: |
        set -e
        cd ./main/
        FILENAME="qshell-${{ env.APP_VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          FILENAME="qshell-${{ env.APP_VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
        fi
        ../qshell rput --resumable-api-v2 --overwrite "$PUBLISH_BUCKET_NAME" "$FILENAME" "$FILENAME"
      env:
        PUBLISH_BUCKET_NAME: ${{ secrets.PUBLISH_BUCKET_NAME }}
